<!DOCTYPE html>
<html>
<head>
  <title>YouTubes</title>

<body>

<h2>YouTubes</h2>

<p id="result">
</p>
<script>
window.onload = function() {
  alert('hi!');

  document.writeln("Hello, World!");
}
</script>


<script>
async function getYouTubeLink(url) {
  const flerbNitz = "AIzaSyDEkIfa-54i680jXTB_H9QyrED8L3WH7AM";
  const videoId = extractVideoId(url);
  if (!videoId) return "Invalid YouTube URL";

  const apiUrl = `https://www.googleapis.com/youtube/v3/videos?id=${videoId}&part=snippet&key=${flerbNitz}`;

  try {
    const response = await fetch(apiUrl);
    const data = await response.json();

    if (!data.items || data.items.length === 0) {
      return "Video not found";
    }

    const title = data.items[0].snippet.title;

    return `<a href="${url}" target="_blank">${title}</a>  - ${url}`;
  } catch (err) {
    return "Error fetching title for ${url}";
  }
}

function extractVideoId(url) {
  let match = url.match(/(?:v=|youtu\.be\/)([^&]+)/);
  return match ? match[1] : null;
}

async function getTitle() {
  const url = document.getElementById("url").value;
  const videoId = extractVideoId(url);

  if (!videoId) {
    document.getElementById("result").innerText = "Invalid URL";
    return;
  }

  try {
    const response = await fetch(apiUrl);
    const data = await response.json();

    const title = data.items[0].snippet.title;

    document.getElementById("result").innerHTML =
      `<a href="${url}" target="_blank">${title}</a>`;
  } catch (err) {
    document.getElementById("result").innerText = "Error fetching title";
  }
}

async function run() {

  const result = await getYouTubeLink("");
  document.getElementById("output").innerHTML = result;
}

</script>

</body>
